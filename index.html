<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftGig | Backend Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* نفس التنسيقات السابقة مع إضافات لوحة التحكم */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Inter', sans-serif; }
        body { background: #f3f4f6; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .auth-panel, .dashboard-panel { background: white; border-radius: 24px; padding: 30px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .hidden { display: none !important; }
        input, button { padding: 12px 16px; border-radius: 12px; border: 1px solid #e5e7eb; margin: 5px 0; width: 100%; }
        button { background: #4f46e5; color: white; font-weight: bold; cursor: pointer; border: none; }
        .orders-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .orders-table th, .orders-table td { padding: 12px; border-bottom: 1px solid #e5e7eb; text-align: left; }
        .status-badge { background: #fef3c7; color: #92400e; padding: 4px 10px; border-radius: 50px; font-size: 0.8rem; }
        .flex-row { display: flex; gap: 20px; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="margin-bottom: 20px;">⚙️ SwiftGig Backend (Heavy Duty)</h1>
    
    <!-- لوحة تسجيل الدخول (تظهر فقط إذا لم يكن مسجلاً) -->
    <div id="authSection" class="auth-panel">
        <h2>🔐 Admin / Freelancer Login</h2>
        <p>Connect to manage orders and receive payments.</p>
        <div id="loginForm">
            <input type="email" id="email" placeholder="Email" />
            <input type="password" id="password" placeholder="Password" />
            <button onclick="signIn()">Sign In</button>
            <button style="background: #111827;" onclick="signUp()">Create Account</button>
        </div>
        <div id="userInfo" class="hidden">
            <p>Logged in as: <span id="userEmail"></span></p>
            <button onclick="signOut()">Sign Out</button>
        </div>
    </div>

    <!-- لوحة تحكم الطلبات (تظهر بعد تسجيل الدخول) -->
    <div id="dashboardSection" class="dashboard-panel hidden">
        <div class="flex-row">
            <h2>📋 Order Management</h2>
            <button style="width: auto; background: #10b981;" onclick="refreshOrders()">🔄 Refresh Live Data</button>
        </div>
        
        <!-- نموذج إضافة طلب يدوي (لاختبار الباك إند) -->
        <div style="background: #f9fafb; padding: 20px; border-radius: 16px; margin: 20px 0;">
            <h3>➕ Simulate New Order (Backend Test)</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                <input type="email" id="testEmail" placeholder="Customer Email" value="client@example.com" />
                <select id="testService">
                    <option value="Logo Design">Logo Design</option>
                    <option value="Resume Writing">Resume Writing</option>
                </select>
                <input type="number" id="testAmount" placeholder="Amount" value="49" />
            </div>
            <button style="margin-top: 10px;" onclick="createTestOrder()">🚀 Insert into Database (Real Backend)</button>
        </div>

        <h3>📊 Live Orders Table (Connected to Supabase)</h3>
        <table class="orders-table" id="ordersTableBody">
            <thead><tr><th>ID</th><th>Time</th><th>Email</th><th>Service</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="ordersList"></tbody>
        </table>

        <!-- عرض الأرباح الكلية -->
        <div style="margin-top: 30px; padding: 20px; background: #1f2937; color: white; border-radius: 16px;">
            <h3>💰 Total Platform Earnings: <span id="totalEarnings">$0.00</span></h3>
        </div>
    </div>
</div>

<script>
    // =============================================
    // 1. استبدل هذه القيم بقيمتك من Supabase
    // =============================================
    const SUPABASE_URL = 'https://your-project.supabase.co'; // 👈 استبدل هنا
    const SUPABASE_ANON_KEY = 'your-anon-key'; // 👈 استبدل هنا
    // =============================================

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUser = null;

    // التحقق من الجلسة الحالية عند التحميل
    window.onload = async () => {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            currentUser = session.user;
            showDashboard();
        }
    };

    function showDashboard() {
        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('dashboardSection').classList.remove('hidden');
        document.getElementById('userEmail').innerText = currentUser.email;
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('userInfo').classList.remove('hidden');
        refreshOrders();
        calculateEarnings();
    }

    async function signIn() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert(error.message);
        else { currentUser = data.user; showDashboard(); }
    }

    async function signUp() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) alert(error.message);
        else alert('Check your email to confirm!');
    }

    async function signOut() {
        await supabase.auth.signOut();
        location.reload();
    }

    // دالة إضافة طلب إلى قاعدة البيانات (باك إند حقيقي)
    async function createTestOrder() {
        const email = document.getElementById('testEmail').value;
        const service = document.getElementById('testService').value;
        const amount = parseFloat(document.getElementById('testAmount').value);
        
        const { data, error } = await supabase
            .from('orders')
            .insert([{ customer_email: email, service_name: service, amount: amount }])
            .select();
            
        if (error) alert('DB Error: ' + error.message);
        else {
            alert('✅ Order inserted successfully! This is real backend.');
            refreshOrders();
            calculateEarnings();
        }
    }

    // جلب الطلبات من قاعدة البيانات
    async function refreshOrders() {
        const { data, error } = await supabase
            .from('orders')
            .select('*')
            .order('created_at', { ascending: false });
            
        if (error) {
            console.error(error);
            return;
        }
        
        const tbody = document.getElementById('ordersList');
        tbody.innerHTML = '';
        data.forEach(order => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${order.id}</td>
                <td>${new Date(order.created_at).toLocaleString()}</td>
                <td>${order.customer_email}</td>
                <td>${order.service_name}</td>
                <td>$${order.amount}</td>
                <td><span class="status-badge">${order.status || 'pending'}</span></td>
                <td><button onclick="markCompleted(${order.id})" style="padding:5px 10px;">✅ Done</button></td>
            `;
            tbody.appendChild(row);
        });
    }

    async function markCompleted(orderId) {
        const { error } = await supabase
            .from('orders')
            .update({ status: 'completed' })
            .eq('id', orderId);
        if (!error) refreshOrders();
    }

    async function calculateEarnings() {
        const { data, error } = await supabase
            .from('orders')
            .select('amount');
        if (data) {
            const total = data.reduce((sum, o) => sum + parseFloat(o.amount || 0), 0);
            document.getElementById('totalEarnings').innerText = `$${total.toFixed(2)}`;
        }
    }

    // دوال عامة للسلة (تربطها أنت بواجهة المستخدم)
    window.addToCart = function(name, price) {
        createTestOrder(); // يمكنك تخصيصها لتأخذ email الزائر
    }
</script>
</body>
</html>
